# This is just a small scale implementation and for demonstration purpose only.
# The actual implementation will look different.
# It will be adapted to requirements of https://github.com/wagtail/news-template/
# code in this file is based upon:
# https://github.com/wagtail/bakerydemo/blob/main/.github/workflows/ci.yml

name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-server:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install ruff
      - run: ruff check . --exclude project_name

  test-server:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - run: pip install -r requirements.txt

      - run: wagtail start mysite --template=https://github.com/${{ github.repository }}/archive/${{ github.sha }}.zip

      - run: |
          cd mysite
          pip install -r requirements.txt
          python manage.py check
          python manage.py makemigrations --check --noinput
          DJANGO_SETTINGS_MODULE=mysite.settings.ci python manage.py test
